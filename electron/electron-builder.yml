appId: com.youtuber.app
productName: Youtuber
directories:
  output: release
  buildResources: src/renderer/build
files:
  - src/renderer/dist/**/*
  - "!node_modules/**/*"
extraResources:
  - from: "../backend/dist/youtuber-backend"
    to: "backend/youtuber-backend"
  - from: "../backend/src/main.py"
    to: "backend/main.py"
  - from: "../backend/src/"
    to: "backend/src/"
win:
  target:
    - target: nsis
      arch: [x64]
    - target: msi
      arch: [x64]
  icon: src/renderer/build/icon.ico
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: src/renderer/build/icon.icns
  category: public.app-category.utilities
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: src/renderer/build/icon.ico
  uninstallerIcon: src/renderer/build/icon.ico
  installerHeaderIcon: src/renderer/build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Youtuber
